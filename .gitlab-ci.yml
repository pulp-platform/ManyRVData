variables:
  GIT_SUBMODULE_STRATEGY: none
  ROOT_DIR: '$CI_PROJECT_DIR'
  APPS: "tests"
  PATH: '/home/gitlabci/.cargo/bin:/usr/local/bin:/usr/bin:/usr/sbin:/sbin:/usr/local/condor/bin:/usr/sepp/bin:$CI_PROJECT_DIR/install/verilator/bin:/home/gitlabci/.local/bin'
  OBJCACHE: ''
  CC: 'gcc-11.2.0'
  CXX: 'g++-11.2.0'
  CMAKE: 'cmake-3.28.3'
  python: 'python3'
  python3: 'python3'

stages:
  - build
  # - sim-vsim

cache:
  paths:
    - install/
  key: "$CI_COMMIT_REF_SLUG-toolchain-v1" # Recommended key structure
  policy: pull-push

.base:
  artifacts:
    when: always
    expire_in: 1 day

cc-preflight:
  stage: build
  script:
    - export CC="$(command -v gcc-11.2.0 || command -v gcc)"
    - export CXX="$(command -v g++-11.2.0 || command -v g++)"
    - echo "CC=$CC"
    - echo "CXX=$CXX"
    - $CC --version
    - $CXX --version
    - |
      cat > /tmp/cc_test.c <<'EOF'
      #include <stdio.h>
      int main(){ puts("cc_ok"); return 0; }
      EOF
      $CC /tmp/cc_test.c -o /tmp/cc_test
      /tmp/cc_test

build-tmp:
  extends: .base
  stage: build
  script:
    - echo "CI WIP, no check available now"

build-tc:
  extends: .base
  stage: build
  timeout: 3h
  script:
    - |
      if [ ! -d "install/llvm" ]; then
        echo "Toolchain not found in cache. Building dependencies..."
        make bender
        make toolchain
        echo "Toolchain built. Will be cached."
      else
        echo "Toolchain found in cache. Skipping build."
      fi

build-vsim:
  extends: .base
  needs: [ build-tc cc-preflight ]
  stage: build
  script:
    - make init
    - make dram-build CMAKE=cmake-3.28.3
    - make generate config=cachepool_fpu_512
    - export CC=$(command -v gcc-11.2.0 || command -v gcc)
    - export CXX=$(command -v g++-11.2.0 || command -v g++)
    - make vsim config=cachepool_fpu_512
  artifacts:
    paths: [ "software/build", "sim/bin" ]

run_dotp:
  extends: .base
  needs: [ build-vsim ]
  stage: sim-vsim
  script:
    - ./sim/bin/cachepool_cluster.vsim ./software/build/CachePoolTests/test-cachepool-fdotp-32b_M1024
  artifacts:
    paths: [ "software/build", "sim/bin" ]
