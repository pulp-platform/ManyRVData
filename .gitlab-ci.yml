variables:
  GIT_SUBMODULE_STRATEGY: none
  ROOT_DIR: '$CI_PROJECT_DIR'
  APPS: "tests"
  PATH: '/home/gitlabci/.cargo/bin:/usr/local/bin:/usr/bin:/usr/sbin:/sbin:/usr/local/condor/bin:/usr/sepp/bin:$CI_PROJECT_DIR/install/verilator/bin:/home/gitlabci/.local/bin'
  OBJCACHE: ''
  CC:  '/usr/pack/gcc-11.2.0-af/linux-x64/bin/gcc'
  CXX: '/usr/pack/gcc-11.2.0-af/linux-x64/bin/g++'
  CMAKE: 'cmake-3.28.3'
  python: 'python3'
  python3: 'python3'

default:
  tags: [dolent]

stages:
  - build

.base:
  artifacts:
    when: always
    expire_in: 1 day

build-vsim:
  extends: .base
  stage: build
  script:
    - echo "Using CC=$CC"
    - echo "Using CXX=$CXX"
    - test -x "$CC"
    - test -x "$CXX"
    - make quick-tool
    - make init
    - make dram-build
    - cd util/auto-benchmark
    - chmod +x ./run_ci.sh
    - ./run_ci.sh

  artifacts:
    paths:
      - software/build
      - sim/bin
      - util/auto-benchmark/logs
